apiVersion: v1
kind: PersistentVolume
metadata:
    name: pv-workspaces
spec:
    capacity:
        storage: 10Gi
    accessModes:
        - ReadWriteOnce
    persistentVolumeReclaimPolicy: Delete
    storageClassName: microk8s-hostpath
    volumeMode: Filesystem
    hostPath:
        path: /mnt/pv-workspaces
        type: DirectoryOrCreate
