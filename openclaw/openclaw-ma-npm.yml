apiVersion: apps/v1
kind: Deployment
metadata:
    name: openclaw-ma-npm
    labels:
        app: openclaw-ma-npm
spec:
    replicas: 1
    selector:
        matchLabels:
            app: openclaw-ma-npm
    template:
        metadata:
            labels:
                app: openclaw-ma-npm
        spec:
            initContainers:
                - name: configure-proxy
                  image: ubuntu:latest
                  command:
                      [
                          "bash",
                          "-c",
                          'echo "Acquire::http::Proxy \"http://apt-cacher-ng-service:3142\";" > /etc/apt/apt.conf.d/00proxy',
                      ]
                  volumeMounts:
                      - name: apt-conf-storage
                        mountPath: /etc/apt/apt.conf.d/
            containers:
                - name: ubuntu-tools
                  image: ubuntu:latest
                  env:
                      - name: TZ
                        value: "America/New_York"
                      - name: DEBIAN_FRONTEND
                        value: "noninteractive"
                      - name: APT_PROXY
                        value: "http://apt-cacher-ng-service:3142"
                  imagePullPolicy: IfNotPresent
                  command: ["/bin/bash"]
                  args:
                      - "-c"
                      - |
                          echo "Acquire::http::Proxy \"http://apt-cacher-ng-service:3142\";" | tee /etc/apt/apt.conf.d/00proxy
                          echo "Updating packages..."
                          apt update
                          apt install -y make npm curl
                          apt install -y python3 python3-pip python3-venv 
                          echo "Keep container running..."
                          tail -f /dev/null
                  resources:
                      limits:
                          cpu: "4"
                      requests:
                          cpu: "1"
                  volumeMounts:
                      - name: apt-conf-storage
                        mountPath: /etc/apt/apt.conf.d/
                      - name: pv-home
                        mountPath: /home
                      - name: pv-workspaces
                        mountPath: /workspaces
            volumes:
                - name: apt-conf-storage
                  emptyDir: {}
                - name: pv-home
                  persistentVolumeClaim:
                      claimName: pv-home
                - name: pv-workspaces
                  persistentVolumeClaim:
                      claimName: pv-workspaces
